name: Build & Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-crm:
    name: Build CRM + Nginx
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            matolado/crm:latest
            matolado/crm:${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=matolado/crm:buildcache
          cache-to:   type=registry,ref=matolado/crm:buildcache,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            matolado/crm-nginx:latest
            matolado/crm-nginx:${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=matolado/crm-nginx:buildcache
          cache-to:   type=registry,ref=matolado/crm-nginx:buildcache,mode=max

  build-agno:
    name: Build Agno Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push agno-service image
        uses: docker/build-push-action@v6
        with:
          context: ./agno-service
          push: true
          tags: |
            matolado/agno-service:latest
            matolado/agno-service:${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=matolado/agno-service:buildcache
          cache-to:   type=registry,ref=matolado/agno-service:buildcache,mode=max
