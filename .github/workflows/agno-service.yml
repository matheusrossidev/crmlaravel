name: Build & Push Agno Service

on:
  push:
    branches:
      - main
    paths:
      - 'agno-service/**'
      - '.github/workflows/agno-service.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and push agno-service image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push agno-service image
        uses: docker/build-push-action@v6
        with:
          context: ./agno-service
          push: true
          tags: |
            matolado/agno-service:latest
            matolado/agno-service:${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=matolado/agno-service:buildcache
          cache-to:   type=registry,ref=matolado/agno-service:buildcache,mode=max
